<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HD | Файлове сховище</title>
    <link rel="icon" type="image/svg+xml" href="/_internal_theme/favicon.svg" />
    <link href="/_internal_theme/bootstrap.min.css" rel="stylesheet" />
    <link href="/_internal_theme/all.min.css" rel="stylesheet" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      body {
        background-color: #f0f2f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          'Segoe UI',
          system-ui,
          -apple-system,
          sans-serif;
      }

      body > h1,
      body > hr {
        display: none !important;
      }

      .container {
        max-width: 90%;
        width: 1200px;
        height: 90vh;
        background: white;
        padding: 0;
        border-radius: 16px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .header-static {
        padding: 25px 40px 15px 40px;
        background: #fff;
        border-bottom: 1px solid #edf2f7;
        flex-shrink: 0;
        z-index: 10;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 800;
        color: #1a202c;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
      }

      h1 i {
        margin-right: 15px;
        color: #3182ce;
      }

      .breadcrumb {
        margin-bottom: 0;
        background: transparent;
        padding: 0;
      }

      .breadcrumb-item a {
        color: #718096;
        text-decoration: none;
        transition: color 0.2s;
      }

      .breadcrumb-item a:hover {
        color: #3182ce;
      }

      #file-list-container {
        flex-grow: 1;
        overflow-y: auto;
        padding: 0;
      }

      .table {
        width: 100%;
        border-collapse: collapse;
        margin: 0;
      }

      .table thead {
        position: sticky;
        top: 0;
        background: #f8fafc;
        z-index: 5;
      }

      .table th {
        padding: 12px 40px;
        text-align: left;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #a0aec0;
        border-bottom: 1px solid #edf2f7;
      }

      .table td {
        padding: 14px 40px;
        vertical-align: middle;
        border-bottom: 1px solid #f7fafc;
        transition: background 0.2s;
      }

      .table tr:hover td {
        background-color: #f7fafc;
      }

      .col-name {
        width: auto;
        text-align: left;
      }
      .col-date {
        width: 220px;
        text-align: right;
        color: #718096;
        font-size: 0.9rem;
      }
      .col-size {
        width: 120px;
        text-align: right;
        color: #718096;
        font-size: 0.9rem;
        font-weight: 600;
      }

      .file-link {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: #2d3748;
        font-weight: 500;
      }

      .file-link:hover {
        color: #3182ce;
      }

      .file-icon {
        font-size: 1.2rem;
        margin-right: 15px;
        width: 25px;
        text-align: center;
      }

      #file-list-container::-webkit-scrollbar {
        width: 8px;
      }
      #file-list-container::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      #file-list-container::-webkit-scrollbar-thumb {
        background: #cbd5e0;
        border-radius: 4px;
      }
      #file-list-container::-webkit-scrollbar-thumb:hover {
        background: #a0aec0;
      }

      pre {
        margin: 0;
        padding: 0;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-static">
        <h1><i class="fas fa-folder-open"></i> Файлове сховище</h1>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Головна</a></li>
            <li class="breadcrumb-item active" aria-current="page">Сховище</li>
          </ol>
        </nav>
      </div>

      <div id="file-list-container">
